global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: fastapi-backend
    dns_sd_configs:
      - names: ['backend']
        type: A
        port: 8000
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
