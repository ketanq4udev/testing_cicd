name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}-backend
  IMAGE_FRONTEND: ${{ github.repository }}-frontend
  IMAGE_LOADBALANCER: ${{ github.repository }}-loadbalancer

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Integration Test (Load Balancer) ─────────────────────────────────────────
  integration-test:
    name: Integration Test (Load Balancer)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Start stack with 3 backend replicas
        run: docker compose up -d --build --scale backend=3

      - name: Wait for HTTPS load balancer to be ready
        run: |
          echo "Polling https://localhost/ (self-signed, using -k) ..."
          for i in $(seq 1 30); do
            if curl -sk https://localhost/ > /dev/null 2>&1; then
              echo "Load balancer HTTPS is up after $i attempt(s)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timed out — dumping logs"
              docker compose logs loadbalancer
              exit 1
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done

      - name: Verify HTTP redirects to HTTPS
        run: |
          status=$(curl -so /dev/null -w "%{http_code}" http://localhost/)
          echo "HTTP status code: $status"
          if [ "$status" != "301" ]; then
            echo "FAIL: expected 301 redirect, got $status"
            exit 1
          fi
          echo "PASS: HTTP → HTTPS redirect working"

      - name: Verify HTTPS load balancer root
        run: |
          response=$(curl -sk https://localhost/)
          echo "HTTPS LB response: $response"
          echo "$response" | grep -q "load-balancer"
          echo "$response" | grep -q "tls"
          echo "PASS: HTTPS endpoint returning correct response"

      - name: Verify API is reachable over HTTPS
        run: |
          curl -sk https://localhost/api/items/ | grep -q "Item One"
          echo "PASS: API items endpoint reachable over HTTPS"

      - name: Verify load balancing across replicas (HTTPS)
        run: |
          echo "Sending 9 HTTPS health requests — collecting instance hostnames..."
          instances=""
          for i in $(seq 1 9); do
            response=$(curl -sk https://localhost/health)
            host=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['instance'])")
            instances="$instances $host"
            echo "  Request $i → $host"
          done
          unique=$(echo $instances | tr ' ' '\n' | grep -v '^$' | sort -u | wc -l)
          echo "Unique instances that responded: $unique / 3"
          if [ "$unique" -lt 2 ]; then
            echo "FAIL: load balancing not distributing — only $unique instance(s) responded"
            exit 1
          fi
          echo "PASS: load balancing confirmed across $unique instances over HTTPS"

      - name: Verify Prometheus is healthy
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:9090/-/healthy > /dev/null 2>&1; then
              echo "Prometheus is up"
              break
            fi
            echo "Waiting for Prometheus... attempt $i/12"
            sleep 5
          done
          curl -sf http://localhost:9090/-/healthy
          echo "Prometheus targets:"
          curl -sf "http://localhost:9090/api/v1/targets" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for t in data['data']['activeTargets']:
              print(f\"  {t['labels'].get('job','?')} | {t['labels'].get('instance','?')} | {t['health']}\")
          "

      - name: Verify Grafana is healthy
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Grafana is up"
              break
            fi
            echo "Waiting for Grafana... attempt $i/12"
            sleep 5
          done
          curl -sf http://localhost:3001/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Grafana status: {d[\"database\"]}')"

      - name: Verify metrics endpoint on backend
        run: |
          echo "Generating traffic..."
          for i in $(seq 1 5); do
            curl -sk https://localhost/api/items/ > /dev/null
            curl -sk https://localhost/api/items/1 > /dev/null
          done
          echo "Waiting up to 40s for Prometheus to scrape (15s interval)..."
          for i in $(seq 1 8); do
            metric=$(curl -sf "http://localhost:9090/api/v1/query?query=http_requests_total" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['data']['result']))")
            echo "  Attempt $i/8 — series count: $metric"
            if [ "$metric" -gt 0 ]; then
              echo "PASS: $metric metric series found in Prometheus"
              break
            fi
            if [ "$i" -eq 8 ]; then
              echo "FAIL: no metrics found after 40s"
              exit 1
            fi
            sleep 5
          done

      - name: Tear down
        if: always()
        run: docker compose down --volumes

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push load balancer
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan (Trivy) ─────────────────────────────────────────────────────
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Filesystem scan: Dockerfiles, configs, dependencies ──
      - name: Scan repo filesystem (misconfigs + secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload filesystem scan results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # ── Image scans ──
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.ref_name }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.ref_name }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Scan loadbalancer image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:${{ github.ref_name }}
          format: sarif
          output: trivy-loadbalancer.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload loadbalancer scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-loadbalancer.sarif
          category: trivy-loadbalancer

      - name: Print scan summary
        if: always()
        run: |
          echo "===== Trivy Scan Summary ====="
          echo "Filesystem : trivy-fs.sarif"
          echo "Backend    : trivy-backend.sarif"
          echo "Frontend   : trivy-frontend.sarif"
          echo "Loadbalancer: trivy-loadbalancer.sarif"
          echo "Results visible in GitHub → Security → Code scanning"

  # ── Deploy (main only) ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy notification
        run: |
          echo "Images ready at commit ${{ github.sha }}"
          echo "  Backend:      ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}"
          echo "  Frontend:     ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}"
          echo "  LoadBalancer: ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:sha-${{ github.sha }}"
          echo "Add your deployment step here (SSH, kubectl, Render, Railway, etc.)"
