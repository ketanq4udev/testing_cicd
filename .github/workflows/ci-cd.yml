name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}-backend
  IMAGE_FRONTEND: ${{ github.repository }}-frontend
  IMAGE_LOADBALANCER: ${{ github.repository }}-loadbalancer

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Integration Test (Load Balancer) ─────────────────────────────────────────
  integration-test:
    name: Integration Test (Load Balancer)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Start stack with 3 backend replicas
        run: docker compose up -d --build --scale backend=3 --wait --timeout 120

      - name: Verify load balancer root
        run: |
          response=$(curl -sf http://localhost/)
          echo "LB response: $response"
          echo "$response" | grep -q "load-balancer"

      - name: Verify API is reachable through load balancer
        run: |
          curl -sf http://localhost/api/items/ | grep -q "Item One"
          echo "API items endpoint: OK"

      - name: Verify load balancing across replicas
        run: |
          echo "Sending 9 health requests — collecting instance hostnames..."
          instances=""
          for i in $(seq 1 9); do
            response=$(curl -sf http://localhost/health)
            host=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['instance'])")
            instances="$instances $host"
            echo "  Request $i → $host"
          done
          unique=$(echo $instances | tr ' ' '\n' | grep -v '^$' | sort -u | wc -l)
          echo "Unique instances that responded: $unique / 3"
          if [ "$unique" -lt 2 ]; then
            echo "FAIL: load balancing not distributing — only $unique instance(s) responded"
            exit 1
          fi
          echo "PASS: load balancing confirmed across $unique instances"

      - name: Tear down
        if: always()
        run: docker compose down --volumes

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push load balancer
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (main only) ────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy notification
        run: |
          echo "Images ready at commit ${{ github.sha }}"
          echo "  Backend:      ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}"
          echo "  Frontend:     ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}"
          echo "  LoadBalancer: ${{ env.REGISTRY }}/${{ env.IMAGE_LOADBALANCER }}:sha-${{ github.sha }}"
          echo "Add your deployment step here (SSH, kubectl, Render, Railway, etc.)"
